# Build config for trunk (https://trunkrs.dev). `trunk build --release`
# emits the static-site bundle (html, js glue, wasm) to `dist/`.
[build]
# Path to the entry-point HTML file trunk processes (NOT the output dir).
# macroquad ships its own canvas-bootstrap JS; trunk links the Rust binary via
# the <link data-trunk rel="rust"> tag inside index.html.
target = "index.html"
# Where trunk writes the bundled site.
dist = "dist"

# Optimize wasm for size on release — physics is f32-heavy and macroquad's miniquad
# backend is small; shrinking the wasm binary from ~4MB to ~3MB on Pages matters
# for first-load. Opt level 's' keeps perf within ~3% of 3.
[profile.release]
opt-level = "s"