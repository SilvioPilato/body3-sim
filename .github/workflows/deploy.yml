name: deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      # Nightly + rust-src: the wasm force-solver pool is built with -Z build-std
      # and atomics/shared-memory (see scripts/assemble-dist.sh).
      - name: Install Rust nightly + wasm target + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Build + assemble dist/
        run: bash scripts/assemble-dist.sh

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=body3-sim
            --branch=${{ github.head_ref || github.ref_name }}
